<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MCA21 Portal{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    {% load static %}
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .navbar {
            background-color: #1a233a;
            padding: 0.5rem 1.5rem;
            height: auto;
            min-height: 60px;
            z-index: 1031;
            position: sticky;
            top: 0;
        }

        .navbar-brand img {
            height: 32px;
            background: white;
            padding: 2px;
            border-radius: 4px;
        }

        .sidebar {
            width: 240px;
            height: calc(100vh - 60px);
            position: fixed;
            top: 60px;
            left: 0;
            background: white;
            border-right: 1px solid #e0e4e8;
            padding-top: 1.5rem;
            z-index: 1030;
            transition: transform 0.3s ease;
        }

        .nav-link {
            color: #5a6a85;
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: 500;
            border-left: 4px solid transparent;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background-color: #f8f9fa;
            color: #1a233a;
        }

        .nav-link.active {
            color: #1a233a;
            background-color: #f8f9fa;
            border-left-color: #003366;
            font-weight: 700;
        }

        .main-content {
            margin-left: 240px;
            padding: 30px 40px;
            transition: all 0.3s ease;
            flex: 1 0 auto;
            width: calc(100% - 240px);
        }

        footer {
            background-color: #1a233a;
            color: #ffffff;
            text-align: center;
            padding: 1rem 0;
            font-size: 0.85rem;
            flex-shrink: 0;
            z-index: 1031;
            position: relative;
        }

        .sidebar-toggler {
            display: none;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            margin-right: 10px;
        }

        @media (max-width: 992px) {
            .sidebar-toggler {
                display: block;
            }
            .sidebar {
                transform: translateX(-100%);
                top: 60px;
                height: calc(100vh - 60px);
            }
            .main-content {
                margin-left: 0;
                padding: 20px;
                width: 100%;
            }
            .sidebar.show {
                transform: translateX(0);
            }
            .navbar-brand span {
                font-size: 1rem !important;
            }
            .user-info {
                display: none !important;
            }
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

    <nav class="navbar navbar-dark d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <button class="sidebar-toggler" type="button" onclick="toggleSidebar()">
                <span class="navbar-toggler-icon" style="width: 20px; height: 20px;"></span>
            </button>
            <a class="navbar-brand d-flex align-items-center" href="{% url 'manage_consultations' %}">
                <img src="{% static 'images/newlogo.png' %}" alt="MCA">
                <span class="ms-2 ms-md-3 fw-bold fs-5">MCA21 Internal Portal</span>
            </a>
        </div>
        <div class="d-flex align-items-center text-white">
            <span class="me-3 opacity-75 small user-info">
                Welcome, {{ user.username }}
            </span>
            <a href="{% url 'logout' %}" class="btn btn-danger btn-sm fw-bold px-3">Logout</a>
        </div>
    </nav>

    <div class="d-flex flex-grow-1">
        <aside class="sidebar" id="sidebar">
            <nav class="nav flex-column">
                <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"
                   href="{% url 'dashboard' consultation.reference_no %}">Dashboard</a>

                <a class="nav-link {% if request.resolver_match.url_name == 'sentiment' %}active{% endif %}"
                   href="{% url 'sentiment' consultation.reference_no %}">Sentiment Analysis</a>

                <a class="nav-link {% if request.resolver_match.url_name == 'word_cloud' %}active{% endif %}"
                   href="{% url 'word_cloud' consultation.reference_no %}">Word Cloud</a>

                <a class="nav-link {% if request.resolver_match.url_name == 'summaries' %}active{% endif %}"
                   href="{% url 'summaries' consultation.reference_no %}">Summaries</a>

                <a class="nav-link {% if request.resolver_match.url_name == 'analysis' %}active{% endif %}"
                   href="{% url 'analysis' consultation.reference_no %}">Ad-hoc Analysis</a>
            </nav>
        </aside>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <footer>
        © 2025 Ministry of Corporate Affairs | Internal Use Only
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('show');
        }
        
        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const toggler = document.querySelector('.sidebar-toggler');
            if (window.innerWidth <= 992 && 
                !sidebar.contains(event.target) && 
                !toggler.contains(event.target) && 
                sidebar.classList.contains('show')) {
                sidebar.classList.remove('show');
            }
        });
    </script>
</body>
</html>
